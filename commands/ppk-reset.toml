# /ppk-reset — Reset phase progress in plan.md

**Trigger:** `/ppk-reset [phase N | all]`

Resets one phase (or all phases) in `plan.md` back to `todo` so the work can be
re-attempted. Only edits `plan.md` — does **not** delete code, branches, or
changelog entries.

---

## Steps

### 1. Find plan.md

Look for `plan.md` in the project root. If it doesn't exist, stop and tell the user.

### 2. Determine target phase(s)

| Invocation | Action |
|---|---|
| `/ppk-reset` (no args) | List phases that are `done` or `in-progress`, ask user which one |
| `/ppk-reset phase 3` | Reset phase 3 only |
| `/ppk-reset 3` | Same as above |
| `/ppk-reset all` | Reset every phase |

### 3. Confirm — mandatory

This is a destructive action. Before making any change, write a full confirmation
sentence and wait for the user to reply with **yes** (or equivalent). Do not proceed
if the user says anything other than a clear affirmative.

Example:
> I will reset Phase 3 ("Implement auth") to **todo** — unchecking all its task
> checkboxes and its Progress Overview entry. This does not delete any code or commits.
> Reply **yes** to continue.

### 4. Apply reset to plan.md

For each target phase:

1. Find the phase's `status` field (e.g. `status: done`) → change to `status: todo`
2. Find all checked task checkboxes inside the phase block (`[x]`) → change to `[ ]`
3. Find the phase's entry in the **Progress Overview** checklist (`- [x] Phase N`) → change to `- [ ] Phase N`

### 5. Confirm completion

Print a short summary of what was reset, e.g.:

> Reset complete: Phase 3 is now **todo**. Run `/ppk-start-task phase 3` to begin again.

---

